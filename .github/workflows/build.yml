name: Build Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Clone Geode SDK
      run: |
        git clone https://github.com/geode-sdk/geode --depth=1
        cd geode
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build for Android64
      run: |
        mkdir build-android64
        cd build-android64
        cmake .. -DGEODE_TARGET_PLATFORM=Android64 -DCMAKE_BUILD_TYPE=Release -G Ninja
        ninja

    - name: Build for Android32
      run: |
        mkdir ../build-android32
        cd ../build-android32
        cmake .. -DGEODE_TARGET_PLATFORM=Android32 -DCMAKE_BUILD_TYPE=Release -G Ninja
        ninja

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: mod-files
        path: |
          build-android64/*.geode
          build-android32/*.geode